# claude-sandbox.conf — per-repo sandbox configuration.
#
# The claude shadow reads this file from $PWD/.devcontainer/claude-sandbox.conf
# at launch time. Run `claude` from the repo root to pick up this config.
# Environment variables take precedence over values set here, so shell or
# CI overrides still work: CLAUDE_SANDBOX_NO_FORGE=1 claude, etc.
#
# This file is installed once by `just promote` and never overwritten on
# re-promote, so your edits survive upstream updates.
#
# ── workspace-root ────────────────────────────────────────────────────
# Override the read-write workspace directory bound into the sandbox.
# Default: /workspaces when $PWD is under /workspaces/, else $PWD.
# Useful when your checkout lives outside /workspaces/ or you want a
# narrower bind than the full /workspaces tree.
#
# workspace-root = /workspaces/myrepo

# ── no-forge ──────────────────────────────────────────────────────────
# Omit gh and glab credential directories from the sandbox so Claude
# cannot authenticate to or push to any remote forge.
# Default: forge credentials are bound (gh/glab can push).
#
# no-forge

# ── allow-write ───────────────────────────────────────────────────────
# Bind an additional directory read-write inside the sandbox.
# Repeat for multiple paths.  Paths that do not exist at launch time are
# silently skipped.
# Default: only the workspace root is writable.
#
# allow-write = /workspaces/shared-cache
# allow-write = /workspaces/peer-project
