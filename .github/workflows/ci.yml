name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            bubblewrap just jq

      # Ubuntu 24.04 runners ship with
      # kernel.apparmor_restrict_unprivileged_userns=1, so plain bwrap
      # fails with "setting up uid map: Permission denied". Relax the
      # sysctl and install an unconfined AppArmor profile for bwrap so
      # downstream checks can spawn the sandbox.
      - name: Allow unprivileged userns on Ubuntu 24.04
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo tee /etc/apparmor.d/bwrap >/dev/null <<'PROFILE'
          abi <abi/4.0>,
          include <tunables/global>
          profile bwrap /usr/bin/bwrap flags=(unconfined) {
            userns,
            include if exists <local/bwrap>
          }
          PROFILE
          sudo systemctl reload apparmor || sudo apparmor_parser -r /etc/apparmor.d/bwrap || true
          bwrap --ro-bind / / --unshare-user --unshare-pid -- /usr/bin/true

      - name: Pre-create /run/secrets so bwrap can mount its tmpfs there
        run: sudo mkdir -p /run/secrets

      # ubuntu-latest runners have $GITHUB_WORKSPACE living under
      # $HOME=/home/runner. Anything that path-checks $HOME contains-X
      # gets tripped by the workspace bind — re-home to a clean dir
      # before invoking bwrap.
      - name: Run bwrap_argv unit tests
        run: |
          export HOME=/tmp/sandbox-home
          mkdir -p "$HOME/.claude" "$HOME/.cache"
          CLAUDE_SANDBOX_SMOKE=1 bash tests/bwrap_argv.sh

      - name: Run install smoke test
        run: |
          export HOME=/tmp/sandbox-home
          mkdir -p "$HOME/.claude" "$HOME/.cache"
          CLAUDE_SANDBOX_SMOKE=1 sudo -E bash tests/smoke.sh

      - name: Run promote test
        run: |
          export HOME=/tmp/sandbox-home
          mkdir -p "$HOME/.claude" "$HOME/.cache"
          CLAUDE_SANDBOX_SMOKE=1 bash tests/promote.sh

  egress-jail:
    # Exercises the egress-jail netns routing enforcement (ADR 0015 / issue #56),
    # which the rest of CI never touches: smoke.sh stays outside the netns and
    # verify-sandbox's jail checks need a live jailed `claude` (manual). The test
    # drives the REAL netns_holder in a throwaway netns and asserts the blackhole
    # allowlist + fail-closed behaviour. It is CAPABILITY-GATED: if the runner
    # cannot grant unshare + CAP_NET_ADMIN it SKIPs cleanly (exit 0) and LOGS what
    # was skipped — so this job never flakes, but the moment a runner (or the
    # devcontainer) CAN grant the caps, the assertions run for real. Kept a
    # separate job (not folded into `test`) so a skip here is obvious in the CI
    # matrix and the job's log makes the skip explicit rather than silent.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install netns deps (passt + iproute2)
        run: |
          sudo apt-get update -qq
          # passt provides `pasta` (the live leg); iproute2 (`ip`) and
          # util-linux (`unshare`) are normally preinstalled — install to be safe.
          sudo apt-get install -y -qq --no-install-recommends \
            passt iproute2 util-linux

      # Ubuntu 24.04 runners ship kernel.apparmor_restrict_unprivileged_userns=1,
      # which blocks the `unshare -rn` the holder needs. Relax it (mirrors the
      # `test` job's bwrap workaround). If the runner still won't grant the caps,
      # the test detects that and SKIPs — it never hard-fails on environment.
      - name: Allow unprivileged userns on Ubuntu 24.04
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Run egress-jail netns enforcement test
        run: |
          # The test self-gates on netns/CAP_NET_ADMIN (and pasta/tun for the
          # live leg) and prints a clear SKIP line when caps are unavailable on
          # the runner. Run it verbosely so the skip-vs-ran decision is visible
          # in the job log (no silent no-op, no pretended coverage).
          bash tests/egress_jail.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends shellcheck

      - name: shellcheck
        run: |
          # Every tracked bash script (by .sh/.bash suffix or shebang), minus
          # the docs/ Python toolchain and build artefacts.
          mapfile -t files < <(
            git ls-files ':!:docs/**' ':!:build/**' | while read -r f; do
              case "$f" in
                *.sh|*.bash) printf '%s\n' "$f" ;;
                *) [ -f "$f" ] && head -1 "$f" | grep -qE '^#!.*\b(ba)?sh\b' \
                     && printf '%s\n' "$f" ;;
              esac
            done
          )
          printf 'Linting %d scripts:\n' "${#files[@]}"
          printf '  %s\n' "${files[@]}"
          # Blocking gate: error severity only — real bugs (parse errors, etc.).
          # The scripts pass `bash -n`, so this is expected to stay green.
          shellcheck --severity=error "${files[@]}"
          # Advisory: surface warning/info findings without gating, so severity
          # can be ratcheted up over time. (shfmt is a deferred follow-up.)
          shellcheck "${files[@]}" \
            || echo "::warning::shellcheck reported advisory (warning/info) findings"
