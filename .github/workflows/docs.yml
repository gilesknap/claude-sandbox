# Build and deploy the Sphinx docs to GitHub Pages.
# NOTE: In repo Settings -> Pages, the build source must be set to
# "GitHub Actions" for the deploy job to publish.
name: Docs

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r docs/requirements.txt

      - run: sphinx-build -b html -W --keep-going docs build/html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/html

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
