name: ETF Daily Monitor

on:
  schedule:
    # 07:30 UTC weekdays = 08:30 BST (summer) / 07:30 GMT (winter)
    # LSE opens at 08:00 UK time; 30-min delay avoids pre-market gaps.
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # allow manual runs from the Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get install -y -qq --no-install-recommends bc

      - name: Run ETF monitor
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: bash etf-monitor.sh
